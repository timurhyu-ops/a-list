<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>A-List</title>
</head>
<body>

  <h1>A-List</h1>

  <!-- LOGIN / REGISTER -->
  <div id="auth-section">
    <h2>Registrer deg</h2>
    <input type="email" id="register-email" placeholder="E-post" />
    <input type="password" id="register-password" placeholder="Passord" />
    <button onclick="register()">Registrer</button>

    <h2>Logg inn</h2>
    <input type="email" id="login-email" placeholder="E-post" />
    <input type="password" id="login-password" placeholder="Passord" />
    <button onclick="login()">Logg inn</button>
  </div>

  <!-- APP (kun synlig når innlogget) -->
  <div id="app-section" style="display:none;">
    <h2>Velkommen til A-List 🎉</h2>
    <p>Du er nå logget inn.</p>
    <button onclick="logout()">Logg ut</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // MIN FIREBASE KONFIGURASJON
const firebaseConfig = {
  apiKey: "AIzaSyBGOli76rds9ZibeOYpzM0XI8cVPvkFUUg",
  authDomain: "a-list-e9555.firebaseapp.com",
  projectId: "a-list-e9555",
  storageBucket: "a-list-e9555.firebasestorage.app",
  messagingSenderId: "505819658918",
  appId: "1:505819658918:web:8a3afd305e9401efbb9267",
  measurementId: "G-VFZGRCMGVV"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const authSection = document.getElementById("auth-section");
    const appSection = document.getElementById("app-section");

    // REGISTRERING
    window.register = async function () {
      const email = document.getElementById("register-email").value;
      const password = document.getElementById("register-password").value;

      try {
        await createUserWithEmailAndPassword(auth, email, password);
        alert("Bruker registrert!");
      } catch (error) {
        alert(error.message);
      }
    };

    // INNLOGGING
    window.login = async function () {
      const email = document.getElementById("login-email").value;
      const password = document.getElementById("login-password").value;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        alert("Innlogget!");
      } catch (error) {
        alert(error.message);
      }
    };

    // UTLOGGING
    window.logout = async function () {
      await signOut(auth);
    };

    // SJEKK OM BRUKER ER INNLOGGET
    onAuthStateChanged(auth, (user) => {
      if (user) {
        authSection.style.display = "none";
        appSection.style.display = "block";
      } else {
        authSection.style.display = "block";
        appSection.style.display = "none";
      }
    });
  </script>

</body>
</html>
